ai_usage_summary: |
  Used ChatGPT and Codex for architectural discussion, debugging,performance optimization, code review, UI refinement,and documentation assistance. All final design decisions,implementation, testing, and submission preparation were performed by the participant.

methodology_summary: |
   Built a hybrid candidate discovery and ranking system combining semantic retrieval using SentenceTransformers embeddings and FAISS vector search with rule-based ranking signals. Candidate ranking incorporates role alignment, skill overlap, semantic similarity, experience fit, activity indicators, and behavioral signals. Honeypot and invalid profiles are filtered during ingestion to improve ranking quality. The system generates recruiter-oriented explanations for each recommendation and produces submission-ready ranking exports compliant with the challenge specification.

